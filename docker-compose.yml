services:
  web:
    build: .
    image: coresec
    restart: unless-stopped
    # Not published to the host — only Caddy reaches it, over the compose network.
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN in .env}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?set TELEGRAM_CHAT_ID in .env}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:-} # unused now (Cloudflare Origin cert); kept for easy rollback to Let's Encrypt
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Cloudflare Origin cert + key — must exist on the host BEFORE `up`, or
      # Docker will create directories in their place. See certs/README.md.
      - ./certs/origin.pem:/etc/caddy/origin.pem:ro
      - ./certs/origin.key:/etc/caddy/origin.key:ro
      - caddy_data:/data # persists ACME state if you ever roll back to Let's Encrypt
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
